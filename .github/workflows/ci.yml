name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # ANTHROPIC_API_KEY must be added as a GitHub Actions secret
          # Settings → Secrets and variables → Actions → New repository secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Deploys are handled by the Vercel CLI below. Three GitHub Actions secrets are required:
      #   VERCEL_TOKEN      — Vercel Account Settings → Tokens → Create token
      #   VERCEL_PROJECT_ID — prj_fdxv5up2q4C2wZsKtTifJeQZI2tu
      #   VERCEL_ORG_ID     — Vercel Account Settings → General
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
